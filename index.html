<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Matchday Ledger</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="./src/styles.css?v=2">
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script type="module" src="./src/main.js?v=2"></script>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div>
        <p class="eyebrow">Premier League 2025/26</p>
        <h1>Matchday Ledger</h1>
      </div>
      <div class="source-strip" id="sourceStrip" aria-live="polite">
        <span class="source-pill pending">Loading data</span>
      </div>
    </div>
  </header>

  <main>
    <nav class="tabbar" aria-label="Primary sections">
      <button class="tab active" type="button" data-tab="table" aria-selected="true">Standings</button>
      <button class="tab" type="button" data-tab="fixtures" aria-selected="false">Fixtures &amp; Results</button>
      <button class="tab" type="button" data-tab="stats" aria-selected="false">Team Stats</button>
      <button class="tab" type="button" data-tab="news" aria-selected="false">News</button>
    </nav>

    <section class="section active" id="section-table" aria-labelledby="tableTitle">
      <div class="section-head">
        <div>
          <p class="section-kicker">League table</p>
          <h2 id="tableTitle">Standings</h2>
        </div>
        <p class="section-note" id="tableUpdated">Waiting for standings</p>
      </div>
      <div id="tableMount" class="surface" aria-live="polite"></div>
    </section>

    <section class="section" id="section-fixtures" aria-labelledby="fixturesTitle">
      <div class="section-head">
        <div>
          <p class="section-kicker">Matchweek</p>
          <h2 id="fixturesTitle">Fixtures &amp; Results</h2>
        </div>
        <div class="round-controls">
          <button type="button" class="icon-button" id="prevRound" aria-label="Previous round">‹</button>
          <span id="roundLabel" class="round-label">Round</span>
          <button type="button" class="icon-button" id="nextRound" aria-label="Next round">›</button>
        </div>
      </div>
      <div id="fixturesMount" aria-live="polite"></div>
    </section>

    <section class="section" id="section-stats" aria-labelledby="statsTitle">
      <div class="section-head">
        <div>
          <p class="section-kicker">Club comparison</p>
          <h2 id="statsTitle">Team Stats</h2>
        </div>
      </div>
      <div id="statsMount" aria-live="polite"></div>
    </section>

    <section class="section" id="section-news" aria-labelledby="newsTitle">
      <div class="section-head">
        <div>
          <p class="section-kicker">Latest feed</p>
          <h2 id="newsTitle">News</h2>
        </div>
        <div class="news-tools" role="search">
          <select id="newsSource" aria-label="Filter news by source">
            <option value="all">All sources</option>
            <option value="ESPN">ESPN</option>
            <option value="Sky Sports">Sky Sports</option>
          </select>
          <input id="newsSearch" type="search" placeholder="Filter by club or headline" aria-label="Filter news">
        </div>
      </div>
      <div id="newsMount" aria-live="polite"></div>
    </section>
  </main>

  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <section class="team-modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" type="button" id="modalClose" aria-label="Close club details">×</button>
      <div id="modalMount"></div>
    </section>
  </div>
</body>
</html>
