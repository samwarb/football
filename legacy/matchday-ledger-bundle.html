document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"3c03cfa8-946f-4c22-919f-7af0bbb5bd18\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d1db2700-1b62-4d6c-a6e9-1219c664453d\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"45c20d0b-0159-43c2-90be-7d442987aff8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"3c03cfa8-946f-4c22-919f-7af0bbb5bd18\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n</style>\n<script src=\"026663f3-cd5e-4762-9380-998b0139efda\"><\/script>\n\n<style>\n  :root {\n    /* Tactical chalkboard: warm cream paper + deep pitch green + chalk accents */\n    --paper:        #f1ead8;         /* warm cream */\n    --paper-2:      #e9e0c6;         /* slightly deeper cream */\n    --paper-3:      #dcd0af;         /* deepest tone-on-tone */\n    --ink:          #17241c;         /* near-black pitch green */\n    --ink-2:        #2b3a30;\n    --ink-soft:     #4a5a4e;\n    --muted:        #7a7560;         /* warm grey-olive */\n    --line:         #b8ab85;         /* chalk line on paper */\n    --line-soft:    rgba(23,36,28,0.14);\n\n    --pitch:        #1d3a2a;         /* deep pitch green */\n    --pitch-2:      #2a5138;\n    --pitch-dark:   #0f2217;\n    --chalk:        #f4ecd8;\n\n    --accent:       #c8462c;         /* annotation red-orange (referee's red pen) */\n    --accent-2:     #d4a23c;         /* mustard yellow card */\n    --accent-3:     #3b6e4e;         /* secondary pitch green */\n    --win:          #3b6e4e;\n    --draw:         #b8932a;\n    --loss:         #a8331f;\n  }\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; }\n  body {\n    background: var(--paper);\n    color: var(--ink);\n    font-family: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;\n    min-height: 100vh;\n    line-height: 1.5;\n    -webkit-font-smoothing: antialiased;\n    /* Subtle paper grain */\n    background-image:\n      radial-gradient(circle at 20% 30%, rgba(184,171,133,0.18) 0 1px, transparent 1px),\n      radial-gradient(circle at 75% 80%, rgba(184,171,133,0.12) 0 1px, transparent 1px),\n      radial-gradient(circle at 55% 15%, rgba(184,171,133,0.14) 0 1px, transparent 1px);\n    background-size: 140px 140px, 200px 200px, 180px 180px;\n  }\n  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }\n  .display { font-family: 'Fraunces', serif; font-style: italic; font-weight: 900; letter-spacing: -0.02em; }\n\n  /* \u2500\u2500 Header: chalkboard strip \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  header {\n    background: var(--pitch);\n    background-image:\n      repeating-linear-gradient(\n        90deg,\n        transparent 0 60px,\n        rgba(255,255,255,0.015) 60px 120px\n      ),\n      radial-gradient(ellipse at top, rgba(255,255,255,0.06), transparent 70%);\n    color: var(--chalk);\n    padding: 0;\n    position: sticky; top: 0; z-index: 100;\n    border-bottom: 3px solid var(--ink);\n  }\n  .header-inner {\n    max-width: 1380px; margin: 0 auto;\n    padding: 20px 32px 18px;\n    display: flex; align-items: center; gap: 20px;\n  }\n  /* Mini pitch diagram as logo */\n  .mini-pitch {\n    width: 64px; height: 44px;\n    border: 1.5px solid var(--chalk);\n    border-radius: 3px;\n    position: relative;\n    background: rgba(0,0,0,0.15);\n    flex-shrink: 0;\n  }\n  .mini-pitch::before, .mini-pitch::after {\n    content: ''; position: absolute; top: 8px; bottom: 8px;\n    width: 10px; border: 1.5px solid var(--chalk); border-left: 0;\n  }\n  .mini-pitch::before { left: 0; border-right: 0; border-left: 1.5px solid var(--chalk); border-top-right-radius: 3px; border-bottom-right-radius: 3px; }\n  .mini-pitch::after  { right: 0; border-right: 1.5px solid var(--chalk); border-left: 0; border-top-left-radius: 3px; border-bottom-left-radius: 3px; }\n  .mini-pitch .ctr-line {\n    position: absolute; left: 50%; top: 0; bottom: 0;\n    width: 0; border-left: 1.5px dashed var(--chalk);\n    transform: translateX(-50%);\n  }\n  .mini-pitch .ctr-circle {\n    position: absolute; left: 50%; top: 50%;\n    width: 14px; height: 14px; border: 1.5px solid var(--chalk); border-radius: 50%;\n    transform: translate(-50%, -50%);\n    background: rgba(255,255,255,0.04);\n  }\n  .header-text .eyebrow {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; font-weight: 500; letter-spacing: 0.24em;\n    color: rgba(244,236,216,0.55);\n    text-transform: uppercase;\n  }\n  .header-text h1 {\n    font-family: 'Fraunces', serif; font-style: italic; font-weight: 900;\n    font-size: 28px; letter-spacing: -0.02em;\n    line-height: 1.05;\n    color: var(--chalk);\n  }\n  .header-text h1 em {\n    font-style: normal; font-weight: 900;\n    text-decoration: underline;\n    text-decoration-color: var(--accent);\n    text-decoration-thickness: 3px;\n    text-underline-offset: 4px;\n  }\n  .season-tag {\n    margin-left: auto;\n    display: flex; align-items: center; gap: 14px;\n  }\n  .matchweek-badge {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px; font-weight: 500; letter-spacing: 0.15em;\n    color: rgba(244,236,216,0.7);\n    text-transform: uppercase;\n    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;\n  }\n  .matchweek-badge .wk-num {\n    font-family: 'Fraunces', serif; font-style: italic; font-weight: 900;\n    font-size: 32px; color: var(--chalk); letter-spacing: -0.04em;\n    line-height: 0.9;\n  }\n  .live-pill {\n    display: inline-flex; align-items: center; gap: 8px;\n    background: rgba(200,70,44,0.18);\n    border: 1px solid var(--accent);\n    padding: 6px 14px; border-radius: 0;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; font-weight: 600; color: var(--accent);\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    clip-path: polygon(0 0, 100% 0, calc(100% - 8px) 100%, 0 100%);\n    padding-right: 20px;\n  }\n  .live-dot {\n    width: 7px; height: 7px; border-radius: 50%;\n    background: var(--accent);\n    box-shadow: 0 0 0 0 rgba(200,70,44,0.6);\n    animation: pulse 1.6s infinite;\n  }\n  @keyframes pulse {\n    0% { box-shadow: 0 0 0 0 rgba(200,70,44,0.7); }\n    70% { box-shadow: 0 0 0 8px rgba(200,70,44,0); }\n    100% { box-shadow: 0 0 0 0 rgba(200,70,44,0); }\n  }\n\n  /* \u2500\u2500 Nav \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  nav {\n    background: var(--paper);\n    border-bottom: 1px solid var(--line-soft);\n    position: sticky;\n    top: 96px; z-index: 90;\n  }\n  .nav-inner {\n    max-width: 1380px; margin: 0 auto;\n    padding: 0 32px;\n    display: flex; gap: 0;\n    overflow-x: auto;\n  }\n  .nav-inner::-webkit-scrollbar { display: none; }\n  nav button {\n    background: none; border: none;\n    color: var(--muted);\n    padding: 16px 22px 14px;\n    cursor: pointer;\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 13px; font-weight: 600;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    white-space: nowrap;\n    transition: color 0.2s;\n    position: relative;\n    border-bottom: 2px solid transparent;\n  }\n  nav button::before {\n    content: attr(data-num);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    color: var(--line);\n    margin-right: 8px;\n    font-weight: 500;\n  }\n  nav button:hover { color: var(--ink); }\n  nav button.active {\n    color: var(--ink);\n    border-bottom-color: var(--accent);\n  }\n  nav button.active::before { color: var(--accent); }\n\n  /* \u2500\u2500 Layout \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  main { max-width: 1380px; margin: 0 auto; padding: 36px 32px 80px; }\n  .section { display: none; }\n  .section.active { display: block; animation: fadeIn 0.4s ease; }\n  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }\n\n  /* \u2500\u2500 Loading \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .loading-wrap {\n    display: flex; flex-direction: column; align-items: center;\n    justify-content: center; gap: 18px; padding: 100px 0;\n    color: var(--muted);\n  }\n  .spinner {\n    width: 32px; height: 32px; border-radius: 50%;\n    border: 2px solid var(--line-soft);\n    border-top-color: var(--ink);\n    animation: spin 0.9s linear infinite;\n  }\n  @keyframes spin { to { transform: rotate(360deg); } }\n  .loading-wrap p { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.08em; }\n\n  .error-wrap { text-align: center; padding: 80px 0; color: var(--muted); }\n  .error-wrap .icon { font-size: 28px; margin-bottom: 10px; }\n\n  /* \u2500\u2500 Section header (annotation style) \u2500\u2500\u2500\u2500\u2500 */\n  .section-head {\n    display: flex; align-items: flex-end; justify-content: space-between;\n    margin-bottom: 28px; flex-wrap: wrap; gap: 12px;\n    padding-bottom: 14px;\n    border-bottom: 1px solid var(--line-soft);\n    position: relative;\n  }\n  .section-head::after {\n    content: ''; position: absolute; bottom: -1px; left: 0;\n    width: 80px; height: 2px; background: var(--ink);\n  }\n  .section-head h2 {\n    font-family: 'Fraunces', serif; font-style: italic; font-weight: 900;\n    font-size: 38px; letter-spacing: -0.025em; color: var(--ink);\n    line-height: 1;\n  }\n  .section-head .hint {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px; color: var(--muted);\n    letter-spacing: 0.08em;\n    display: flex; align-items: center; gap: 8px;\n  }\n  .updated-tag {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px; color: var(--muted); letter-spacing: 0.06em;\n  }\n  .updated-tag .dot { color: var(--accent); }\n\n  /* \u2500\u2500 LEAGUE TABLE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .table-shell {\n    background: var(--paper-2);\n    border: 1.5px solid var(--ink);\n    box-shadow: 4px 4px 0 var(--ink);\n    overflow-x: auto;\n  }\n  .league-table { width: 100%; border-collapse: collapse; min-width: 860px; }\n  .league-table thead th {\n    padding: 12px 10px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; font-weight: 600;\n    text-transform: uppercase; letter-spacing: 0.14em;\n    color: var(--muted);\n    background: var(--paper-3);\n    border-bottom: 1.5px solid var(--ink);\n    text-align: center;\n  }\n  .league-table thead th.left { text-align: left; padding-left: 20px; }\n  .league-table tbody tr {\n    border-bottom: 1px solid var(--line-soft);\n    cursor: pointer;\n    transition: background 0.15s;\n  }\n  .league-table tbody tr:hover {\n    background: rgba(29,58,42,0.06);\n  }\n  .league-table tbody tr:hover .team-name-full {\n    text-decoration: underline;\n    text-decoration-color: var(--accent);\n    text-decoration-thickness: 2px;\n  }\n  .league-table td {\n    padding: 12px 10px;\n    font-size: 14px;\n    vertical-align: middle;\n    text-align: center;\n    font-variant-numeric: tabular-nums;\n  }\n  .league-table td.left { text-align: left; padding-left: 20px; }\n  .zone-band {\n    display: inline-block; width: 4px; height: 36px;\n    margin-right: 12px; vertical-align: middle;\n    border-radius: 0;\n  }\n  .pos-num {\n    display: inline-flex; align-items: center; justify-content: center;\n    width: 30px; height: 30px;\n    font-family: 'Fraunces', serif; font-style: italic; font-weight: 900;\n    font-size: 18px;\n    color: var(--ink);\n    letter-spacing: -0.02em;\n  }\n  .pos-trend {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    margin-left: 2px;\n  }\n  .trend-up { color: var(--win); }\n  .trend-dn { color: var(--loss); }\n  .trend-eq { color: var(--muted); }\n\n  .team-cell { display: flex; align-items: center; gap: 14px; }\n  .team-logo {\n    width: 34px; height: 34px; object-fit: contain; flex-shrink: 0;\n  }\n  .team-logo-placeholder {\n    width: 34px; height: 34px;\n    background: var(--paper-3);\n    border: 1px solid var(--line);\n    flex-shrink: 0;\n    display: flex; align-items: center; justify-content: center;\n    font-family: 'JetBrains Mono', monospace;\n    font-s
