r(--line);\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n  }\n  .news-chevron {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 18px; color: var(--muted);\n    align-self: center;\n    padding: 0 20px;\n    transition: transform 0.25s;\n    flex-shrink: 0;\n  }\n  .news-card.expanded .news-chevron { transform: rotate(180deg); color: var(--accent); }\n\n  .news-expanded-panel {\n    display: none;\n    border-top: 1.5px solid var(--ink);\n    background: var(--paper);\n  }\n  .news-card.expanded .news-expanded-panel { display: block; }\n  .news-expanded-img {\n    width: 100%; max-height: 360px; object-fit: cover;\n    border-bottom: 1.5px solid var(--ink);\n  }\n  .news-expanded-body { padding: 24px 28px; }\n  .news-expanded-headline {\n    font-family: 'Fraunces', serif; font-style: italic; font-weight: 900;\n    font-size: 28px; line-height: 1.15; letter-spacing: -0.02em;\n    margin-bottom: 14px;\n  }\n  .news-expanded-desc {\n    font-size: 15px; color: var(--ink-soft);\n    line-height: 1.7; margin-bottom: 20px;\n  }\n  .news-expanded-meta {\n    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;\n    margin-bottom: 20px;\n  }\n  .news-team-chip {\n    padding: 3px 10px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; font-weight: 600;\n    background: var(--paper-2); color: var(--ink);\n    border: 1px solid var(--line);\n    letter-spacing: 0.06em;\n  }\n  .news-read-btn {\n    display: inline-flex; align-items: center; gap: 10px;\n    background: var(--ink); color: var(--paper);\n    text-decoration: none;\n    padding: 10px 20px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 12px; font-weight: 600;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    transition: background 0.15s;\n  }\n  .news-read-btn:hover { background: var(--accent); }\n\n  @media (max-width: 600px) { .news-img { display: none; } }\n\n  /* \u2500\u2500 Modal \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .overlay {\n    display: none; position: fixed; inset: 0;\n    background: rgba(23,36,28,0.7);\n    z-index: 200;\n    backdrop-filter: blur(6px);\n    align-items: flex-start; justify-content: center;\n    padding: 40px 20px;\n    overflow-y: auto;\n  }\n  .overlay.open { display: flex; animation: fadeIn 0.2s ease; }\n  .modal {\n    background: var(--paper);\n    border: 2px solid var(--ink);\n    box-shadow: 8px 8px 0 var(--accent);\n    width: 100%; max-width: 920px;\n    padding: 32px 36px;\n    position: relative;\n    animation: slideUp 0.3s ease;\n  }\n  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }\n  .modal-close {\n    position: absolute; top: 18px; right: 20px;\n    background: var(--paper); border: 1.5px solid var(--ink);\n    color: var(--ink);\n    width: 32px; height: 32px; cursor: pointer;\n    font-size: 16px; font-weight: 700;\n    display: flex; align-items: center; justify-content: center;\n    transition: all 0.15s;\n  }\n  .modal-close:hover { background: var(--accent); color: var(--paper); border-color: var(--accent); }\n  .modal-head { display: flex; align-items: center; gap: 22px; margin-bottom: 28px; }\n  .modal-logo { width: 72px; height: 72px; object-fit: contain; }\n  .modal-team-name {\n    font-family: 'Fraunces', serif; font-style: italic; font-weight: 900;\n    font-size: 34px; letter-spacing: -0.025em; color: var(--ink);\n    line-height: 1;\n  }\n  .modal-team-sub {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px; color: var(--muted);\n    letter-spacing: 0.15em; text-transform: uppercase;\n    margin-top: 6px;\n  }\n  .kpi-row {\n    display: grid; grid-template-columns: repeat(5, 1fr); gap: 0;\n    margin-bottom: 30px;\n    border: 1.5px solid var(--ink);\n  }\n  .kpi {\n    padding: 16px;\n    text-align: center;\n    background: var(--paper-2);\n    border-right: 1.5px solid var(--ink);\n  }\n  .kpi:last-child { border-right: 0; }\n  .kpi .val {\n    font-family: 'Fraunces', serif; font-style: italic; font-weight: 900;\n    font-size: 32px; color: var(--ink);\n    letter-spacing: -0.03em;\n    line-height: 1;\n  }\n  .kpi .lbl {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px; text-transform: uppercase; letter-spacing: 0.18em;\n    color: var(--muted); margin-top: 6px;\n    font-weight: 600;\n  }\n  .modal-section-title {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em;\n    color: var(--ink); font-weight: 600;\n    margin-bottom: 14px;\n    padding-bottom: 6px;\n    border-bottom: 1.5px solid var(--ink);\n  }\n  .chart-box { position: relative; height: 240px; margin-bottom: 28px; }\n  .results-scroll {\n    max-height: 260px; overflow-y: auto;\n    display: flex; flex-direction: column; gap: 4px;\n    padding-right: 6px;\n  }\n  .result-item {\n    display: flex; align-items: center; gap: 14px;\n    background: var(--paper-2);\n    border: 1px solid var(--line-soft);\n    padding: 10px 14px;\n    font-size: 13px;\n  }\n  .result-round {\n    font-family: 'JetBrains Mono', monospace;\n    color: var(--muted); font-size: 10px;\n    min-width: 34px; letter-spacing: 0.1em;\n  }\n  .result-teams { flex: 1; font-weight: 500; }\n  .result-score {\n    font-family: 'Fraunces', serif; font-style: italic; font-weight: 900;\n    font-size: 16px; min-width: 60px; text-align: center;\n  }\n  .result-badge {\n    width: 24px; height: 24px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px; font-weight: 700; color: white;\n    display: flex; align-items: center; justify-content: center;\n  }\n  .rbadge-w { background: var(--win); }\n  .rbadge-d { background: var(--draw); }\n  .rbadge-l { background: var(--loss); }\n  .rbadge-u { background: var(--paper-3); color: var(--muted); }\n\n  /* \u2500\u2500 Scrollbar \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  ::-webkit-scrollbar { width: 8px; height: 8px; }\n  ::-webkit-scrollbar-track { background: var(--paper-2); }\n  ::-webkit-scrollbar-thumb { background: var(--line); border: 1px solid var(--paper-2); }\n  ::-webkit-scrollbar-thumb:hover { background: var(--ink); }\n\n  @media (max-width: 700px) {\n    .header-inner { padding: 14px 18px; gap: 12px; }\n    .header-text h1 { font-size: 20px; }\n    .mini-pitch { display: none; }\n    .nav-inner { padding: 0 12px; }\n    main { padding: 20px 16px 60px; }\n    .kpi-row { grid-template-columns: repeat(3, 1fr); }\n    .kpi:nth-child(3) { border-right: 0; }\n    .modal { padding: 22px; box-shadow: 4px 4px 0 var(--accent); }\n    .section-head h2 { font-size: 28px; }\n  }\n</style>\n</head>\n<body>\n\n<header>\n  <div class=\"header-inner\">\n    <div class=\"mini-pitch\">\n      <div class=\"ctr-line\"></div>\n      <div class=\"ctr-circle\"></div>\n    </div>\n    <div class=\"header-text\">\n      <div class=\"eyebrow\">English Top Flight \u00b7 Season 2025/26</div>\n      <h1>The Matchday <em>Ledger</em></h1>\n    </div>\n    <div class=\"season-tag\">\n      <div class=\"matchweek-badge\">\n        <span>Matchweek</span>\n        <span class=\"wk-num\" id=\"hdrMatchweek\">\u2014</span>\n      </div>\n      <div class=\"live-pill\">\n        <div class=\"live-dot\"></div>\n        <span>On&nbsp;Air</span>\n      </div>\n    </div>\n  </div>\n</header>\n\n<nav>\n  <div class=\"nav-inner\" id=\"mainNav\">\n    <button class=\"active\" data-num=\"01\" onclick=\"switchTab('table', this)\">Standings</button>\n    <button data-num=\"02\" onclick=\"switchTab('results', this)\">Matchday</button>\n    <button data-num=\"03\" onclick=\"switchTab('stats', this)\">Dossier</button>\n    <button data-num=\"04\" onclick=\"switchTab('news', this)\">Wire</button>\n  </div>\n</nav>\n\n<main>\n  <!-- STANDINGS -->\n  <div class=\"section active\" id=\"section-table\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"hint\"><span>\u00a7 01</span> \u00b7 The League</div>\n        <h2>Standings</h2>\n      </div>\n      <span class=\"updated-tag\" id=\"tableUpdated\">Loading\u2026</span>\n    </div>\n\n    <div id=\"tableContent\"><div class=\"loading-wrap\"><div class=\"spinner\"></div><p>Fetching standings\u2026</p></div></div>\n  </div>\n\n  <!-- MATCHDAY -->\n  <div class=\"section\" id=\"section-results\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"hint\"><span>\u00a7 02</span> \u00b7 Fixtures &amp; Results</div>\n        <h2>Matchday</h2>\n      </div>\n      <span class=\"updated-tag\" id=\"resultsUpdated\"></span>\n    </div>\n    <div class=\"rnd-nav\">\n      <button id=\"prevRnd\" onclick=\"changeRound(-1)\">\u2190 Prev</button>\n      <div class=\"rnd-label-block\">\n        <div class=\"rnd-label-eyebrow\" id=\"rndNumberLabel\">Matchweek \u2014</div>\n        <div class=\"rnd-label\" id=\"rndLabel\">Loading\u2026</div>\n      </div>\n      <button id=\"nextRnd\" onclick=\"changeRound(1)\">Next \u2192</button>\n    </div>\n    <div id=\"resultsContent\"><div class=\"loading-wrap\"><div class=\"spinner\"></div><p>Loading fixtures\u2026</p></div></div>\n  </div>\n\n  <!-- DOSSIER -->\n  <div class=\"section\" id=\"section-stats\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"hint\"><span>\u00a7 03</span> \u00b7 Season at a Glance</div>\n        <h2>The Dossier</h2>\n      </div>\n    </div>\n    <div id=\"statsContent\"><div class=\"loading-wrap\"><div class=\"spinner\"></div><p>Compiling numbers\u2026</p></div></div>\n  </div>\n\n  <!-- WIRE -->\n  <div class=\"section\" id=\"section-news\">\n    <div class=\"section-head\">\n      <div>\n        <div class=\"hint\"><span>\u00a7 04</span> \u00b7 Latest Dispatches</div>\n        <h2>The Wire</h2>\n      </div>\n    </div>\n    <div id=\"newsContent\"><div class=\"loading-wrap\"><div class=\"spinner\"></div><p>Pulling latest reports\u2026</p></div></div>\n  </div>\n</main>\n\n<div class=\"overlay\" id=\"overlay\" onclick=\"overlayClick(event)\">\n  <div class=\"modal\" id=\"modalEl\">\n    <button class=\"modal-close\" onclick=\"closeModal()\">\u2715</button>\n    <div id=\"modalBody\">\n      <div class=\"loading-wrap\"><div class=\"spinner\"></div><p>Loading team\u2026</p></div>\n    </div>\n  </div>\n</div>\n\n<script>\n// ====================================================================\n// CONFIG & CONSTANTS \u2014 unchanged from original\n// ====================================================================\nconst SPORTSDB_LEAGUE = 4328;\nconst SEASON = '2025-2026';\nconst CURRENT_ROUND_MAX = 38;\n\nconst ESPN_STANDINGS  = 'https://site.api.espn.com/apis/v2/sports/soccer/eng.1/standings';\nconst ESPN_SCOREBOARD = 'https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard';\nconst ESPN_NEWS       = 'https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/news?limit=20';\nconst ESPN_LEADERS    = 'https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/leaders';\n\nconst SKY_RSS_URL     = 'https://www.skysports.com/rss/12040';\nconst SKY_RSS2JSON    = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(SKY_RSS_URL)}`;\nconst SKY_NON_FOOTBALL = /\\/(tennis|nba|f1|cricket|rugby|golf|boxing|darts|nfl|mma|wwe|racing|netball)\\//i;\n\nconst SPORTSDB_ROUND  = (r) =>\n  `https://www.thesportsdb.com/api/v1/json/3/eventsround.php?id=${SPORTSDB_LEAGUE}&r=${r}&s=${SEASON}`;\nconst SPORTSDB_SEASON =\n  `https://www.thesportsdb.com/api/v1/json/3/eventsseason.php?id=${SPORTSDB_LEAGUE}&s=${SEASON}`;\n\n// ====================================================================\n// STATE\n// ====================================================================\nlet standingsData  = null;\nlet currentRound   = 1;\nlet maxRound       = 1;\nlet roundCache     = {};\nlet allSeasonEvents = null;\nlet progressionChartInst = null;\nlet teamGoalsChartInst   = null;\nlet titleRaceChartInst   = null;\nlet titleRaceState       = { hidden: new Set() };\nlet activeSection  = 'table';\nlet prevScoreMap   = {};\n\n// ====================================================================\n// FETCH HELPERS\n// ====================================================================\n// ESPN scoreboard gives real-time scores (TheSportsDB free tier lags by many\n// minutes). We overlay ESPN data onto today's SportsDB events before render.\nfunction normaliseTeamLite(name) {\n  return (name || '').toLowerCase()\n    .replace(/&amp;/g, '&').replace(/\\s*&\\s*/g, ' and ')\n    .replace(/\\bafc\\b/g, '').replace(/\\bfc\\b/g, '')\n    .replace(/[^a-z0-9 ]/g, ' ').replace(/\\s+/g, ' ').trim();\n}\nasync function fetchEspnLiveMap() {\n  try {\n    const bust = '?_=' + Date.now();\n    const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard' + bust, { cache: 'no-store' });\n    if (!res.ok) return {};\n    const data = await res.json();\n    const map = {};\n    for (const ev of (data.events || [])) {\n      const comp = (ev.competitions || [])[0]; if (!comp) continue;\n      const home = comp.competitors.find(c => c.homeAway === 'home');\n      const away = comp.competitors.find(c => c.homeAway === 'away');\n      if (!home || !away) continue;\n      const hName = home.team?.displayName || home.team?.name;\n      const aName = away.team?.displayName || away.team?.name;\n      const st = comp.status?.type || {};\n      const stateName = st.name || '';\n      let sdbStatus = null, progress = null;\n      if (stateName === 'STATUS_IN_PROGRESS') {\n        sdbStatus = '2H';\n        progress = comp.status?.displayClock || null;\n      } else if (stateName === 'STATUS_HALFTIME') {\n        sdbStatus = 'HT';\n      } else if (stateName === 'STATUS_FULL_TIME' || st.completed) {\n        sdbStatus = 'Match Finished';\n      } else if (stateName === 'STATUS_POSTPONED') {\n        sdbStatus = 'Postponed';\n      }\n      map[normaliseTeamLite(hName) + '|' + normaliseTeamLite(aName)] = {\n        home: parseInt(home.score, 10),\n        away: parseInt(away.score, 10),\n        status: sdbStatus,\n        progress,\n      };\n    }\n    return map;\n  } catch (e) {\n    console.warn('[ESPN live] fetch failed:', e);\n    return {};\n  }\n}\n\nasync function apiFetch(url) {\n  const bust = (url.includes('?') ? '&' : '?') + '_=' + Date.now();\n  const res = await fetch(url + bust, { cache: 'no-store' });\n  if (!res.ok) throw new Error(`HTTP ${res.status}`);\n  return res.json();\n}\n\nfunction errHtml(msg) {\n  return `<div class=\"error-wrap\"><div class=\"icon\">\u23af</div><p>${msg}</p></div>`;\n}\n\n// Odometer count-up for integers\nfunction animateCount(el, to, duration = 900) {\n  const from = parseFloat(el.dataset.curVal || '0');\n  const start = performance.now();\n  const d = Math.max(300, duration);\n  function frame(now) {\n    const t = Math.min(1, (now - start) / d);\n    const eased = 1 - Math.pow(1 - t, 3);\n    const val = Math.round(from + (to - from) * eased);\n    el.textContent = val;\n    if (t < 1) requestAnimationFrame(frame);\n    else el.dataset.curVal = to;\n  }\n  requestAnimationFrame(frame);\n}\n\n// ====================================================================\n// STANDINGS TABLE\n// ====================================================================\nasync function loadTable() {\n  try {\n    const data = await apiFetch(ESPN_STANDINGS);\n    standingsData = data;\n    renderTable(data);\n    updateHeaderMatchweek();\n  } catch(e) {\n    document.getElementById('tableContent').innerHTML = errHtml('Could not load standings. Check your connection.');\n  }\n}\n\nfunction getStat(entry, name) {\n  const s = entry.stats?.find(s => s.name === name || s.abbreviation === name);\n  return s ? (parseFloat(s.value) || 0) : 0;\n}\n\nfunction updateHeaderMatchweek() {\n  const entries = standingsData?.children?.[0]?.standings?.entries || [];\n  if (!entries.length) return;\n  const maxPlayed = Math.max(...entries.map(e => getStat(e, 'gamesPlayed')));\n  document.getElementById('hdrMatchweek').textContent = String(maxPlayed).padStart(2, '0');\n}\n\nfunction renderTable(data) {\n  let entries = data.children?.[0]?.standings?.entries || [];\n  if (!entries.length) {\n    document.getElementById('tableContent').innerHTML = errHtml('No standings data.');\n    return;\n  }\n\n  entries.sort((a, b) => getStat(a,'rank') - getStat(b,'rank'));\n  document.getElementById('tableUpdated').innerHTML =\n    `<span class=\"dot\">\u25cf</span> Updated ${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;\n\n  const zoneBandCls = (pos) => {\n    if (pos <= 4) return 'z-cl';\n    if (pos <= 6) return 'z-el';\n    if (pos === 7) return 'z-conf';\n    if (pos >= 18) return 'z-rel';\n    return 'z-mid';\n  };\n\n  const rowsHtml = [];\n  entries.forEach((entry, i) => {\n    const pos  = getStat(entry,'rank') || (i + 1);\n    const team = entry.team;\n    const logo = team?.logos?.[0]?.href || '';\n    const gf   = getStat(entry,'pointsFor');\n    const ga   = getStat(entry,'pointsAgainst');\n    const gd   = getStat(entry,'pointDifferential') || (gf - ga);\n    const pts  = getStat(entry,'points');\n    const W    = getStat(entry,'wins');\n    const D    = getStat(entry,'ties');\n    const L    = getStat(entry,'losses');\n    const MP   = getStat(entry,'gamesPlayed') || W + D + L;\n\n    // Divider rows\n    if (pos === 5) rowsHtml.push(`<tr class=\"zone-divider\"><td colspan=\"11\" data-zone=\"\u2500\u2500 Europa League \u2500\u2500\"></td></tr>`);\n    if (pos === 7) rowsHtml.push(`<tr class=\"zone-divider\"><td colspan=\"11\" data-zone=\"\u2500\u2500 Conference League \u2500\u2500\"></td></tr>`);\n    if (pos === 8) rowsHtml.push(`<tr class=\"zone-divider\"><td colspan=\"11\" data-zone=\"\u2500\u2500 Mid-table \u2500\u2500\"></td></tr>`);\n    if (pos === 18) rowsHtml.push(`<tr class=\"zone-divider\"><td colspan=\"11\" data-zone=\"\u2500\u2500 Relegation \u2500\u2500\"></td></tr>`);\n\n    const gdStr = gd > 0 ? `+${Math.round(gd)}` : Math.round(gd);\n    const gdCls = gd > 0 ? 'gd-pos' : gd < 0 ? 'gd-neg' : 'gd-neu';\n\n    // Pseudo-form from W/D/L ratio (standings API doesn't expose actual form)\n    const formPips = [\n      ...Array(Math.min(W, 3)).fill('<div class=\"form-pip form-w\">W</div>'),\n      ...Array(Math.min(D, 1)).fill('<div class=\"form-pip form-d\">D</div>'),\n      ...Array(Math.min(L, 1)).fill('<div class=\"form-pip form-l\">L</div>'),\n    ].slice(0, 5).join('');\n\n    const logoEl = logo\n      ? `<img class=\"team-logo\" src=\"${logo}\" alt=\"${team.displayName}\" loading=\"lazy\" onerror=\"this.style.display='none'\">`\n      : `<div class=\"team-logo-placeholder\">${team?.abbreviation?.slice(0,3)||'?'}</div>`;\n\n    const teamId = team?.id || '';\n    const teamName = team?.displayName || 'Unknown';\n    const abbr = team?.abbreviation || '';\n\n    rowsHtml.push(`<tr onclick=\"openTeamModal('${teamId}','${encodeURIComponent(teamName)}','${encodeURIComponent(logo)}')\">\n      <td><div style=\"display:flex;align-items:center;gap:2px\">\n        <div class=\"zone-band ${zoneBandCls(pos)}\"></div>\n        <div class=\"pos-num\">${String(pos).padStart(2,'0')}</div>\n      </div></td>\n      <td class=\"left\">\n        <div class=\"team-cell\">\n          ${logoEl}\n          <div>\n            <div class=\"team-name-full\">${teamName}<span class=\"team-abbr\">${abbr}</span></div>\n          </div>\n        </div>\n      </td>\n      <td class=\"mono\">${MP}</td>\n      <td class=\"mono\">${W}</td>\n      <td class=\"mono\">${D}</td>\n      <td class=\"mono\">${L}</td>\n      <td class=\"mono\">${Math.round(gf)}</td>\n      <td class=\"mono\">${Math.round(ga)}</td>\n      <td class=\"${gdCls} mono\">${gdStr}</td>\n      <td class=\"pts-cell\">${Math.round(pts)}</td>\n      <td><div class=\"form-row\">${formPips || '<span style=\"color:var(--muted);font-family:monospace;font-size:11px\">\u2014</span>'}</div></td>\n    </tr>`);\n  });\n\n  document.getElementById('tableContent').innerHTML = `\n    <div class=\"table-shell\">\n      <table class=\"league-table\">\n        <thead><tr>\n          <th>Pos</th>\n          <th class=\"left\">Club</th>\n          <th>MP</th><th>W</th><th>D</th><th>L</th>\n          <th>GF</th><th>GA</th><th>GD</th>\n          <th>Pts</th><th>Form</th>\n        </tr></thead>\n        <tbody>${rowsHtml.join('')}</tbody>\n      </table>\n    </div>\n    <div class=\"legend\">\n      <div class=\"legend-item\"><div class=\"legend-swatch\" style=\"background:var(--pitch)\"></div>Champions League</div>\n      <div class=\"legend-item\"><div class=\"legend-swatch\" style=\"background:var(--accent-3)\"></div>Europa League</div>\n      <div class=\"legend-item\"><div class=\"legend-swatch\" style=\"background:var(--accent-2)\"></div>Conference League</div>\n      <div class=\"legend-item\"><div class=\"legend-swatch\" style=\"background:var(--accent)\"></div>Relegation</div>\n    </div>`;\n}\n\n// ====================================================================\n// TITLE RACE CHART\n// ====================================================================\nasync function renderTitleRace(data) {\n  const entries = data.children?.[0]?.standings?.entries || [];\n  if (!entries.length) return;\n\n  const sorted = [...entries].sort((a,b) => getStat(a,'rank') - getStat(b,'rank'));\n  const top6 = sorted.slice(0, 6);\n\n  // We need per-matchweek progression. Try to use allSeasonEvents; if not loaded, fetch.\n  if (!allSeasonEvents) {\n    try {\n      const sd = await apiFetch(SPORTSDB_SEASON);\n      allSeasonEvents = sd.events || [];\n    } catch(e) {\n      console.warn('[TitleRace] season events fetch failed:', e);\n      document.getElementById('titleRaceBlock').style.display = 'none';\n      return;\n    }\n  }\n\n  // Palette for lines\n  const palette = ['#c8462c', '#1d3a2a', '#3b6e4e', '#d4a23c', '#7a5e9c', '#5a7c99'];\n\n  // Build cumulative pts by round for each top-6 team\n  const datasets = [];\n  const legendHtml = [];\n\n  top6.forEach((entry, idx) => {\n    const teamName = entry.team?.displayName;\n    const teamShort = entry.team?.shortDisplayName || entry.team?.displayName;\n    const color = palette[idx];\n\n    const teamEvents = (allSeasonEvents || [])\n      .filter(e => (e.strHomeTeam === teamName || e.strAwayTeam === teamName))\n      .filter(e => e.intHomeScore != null && e.intHomeScore !== '' && e.intHomeScore !== 'null')\n      .sort((a,b) => parseInt(a.intRound||0) - parseInt(b.intRound||0));\n\n    let pts = 0;\n    const data = [{ x: 0, y: 0 }];\n    teamEvents.forEach(ev => {\n      const isHome = ev.strHomeTeam === teamName;\n      const h = parseInt(ev.intHomeScore), a = parseInt(ev.intAwayScore);\n      const mine = isHome ? h : a, theirs = isHome ? a : h;\n      if (mine > theirs) pts += 3; else if (mine === theirs) pts += 1;\n      data.push({ x: parseInt(ev.intRound), y: pts });\n    });\n\n    if (data.length > 1) {\n      datasets.push({\n        label: teamShort,\n        data,\n        borderColor: color,\n        backgroundColor: color + '22',\n        borderWidth: 2.5,\n        tension: 0.35,\n        pointRadius: 0,\n        pointHoverRadius: 5,\n        pointBackgroundColor: color,\n        pointBorderColor: color,\n        fill: false,\n      });\n      legendHtml.push(\n        `<span class=\"title-race-chip\" data-idx=\"${datasets.length - 1}\" data-label=\"${teamShort}\" onclick=\"toggleTitleRaceLine(${datasets.length - 1})\">\n          <span class=\"chip-dot\" style=\"background:${color}\"></span>${teamShort}\n        </span>`\n      );\n    }\n  });\n\n  if (!datasets.length) {\n    document.getElementById('titleRaceBlock').style.display = 'none';\n    return;\n  }\n\n  document.getElementById('titleRaceBlock').style.display = 'block';\n  document.getElementById('titleRaceLegend').innerHTML = legendHtml.join('');\n\n  const maxRnd = Math.max(...datasets.flatMap(d => d.data.map(p => p.x)));\n\n  if (titleRaceChartInst) titleRaceChartInst.destroy();\n  const ctx = document.getElementById('titleRaceChart');\n  titleRaceChartInst = new Chart(ctx, {\n    type: 'line',\n    data: { datasets },\n    options: {\n      responsive: true,\n      maintainAspectRatio: false,\n      animation: { duration: 1200, easing: 'easeOutCubic' },\n      interaction: { mode: 'index', intersect: false },\n      scales: {\n        x: {\n          type: 'linear',\n          min: 0, max: maxRnd,\n          title: { display: true, text: 'Matchweek', font: { family: 'JetBrains Mono', size: 10 }, color: '#7a7560' },\n          ticks: {\n            stepSize: 4,\n            color: '#7a7560',\n            font: { family: 'JetBrains Mono', size: 10 },\n            callback: v => v === 0 ? '' : `MW${v}`,\n          },\n          grid: { color: 'rgba(23,36,28,0.06)' },\n          border: { color: '#17241c', width: 1.5 },\n        },\n        y: {\n          beginAtZero: true,\n          title: { display: true, text: 'Points', font: { family: 'JetBrains Mono', size: 10 }, color: '#7a7560' },\n          ticks: { color: '#7a7560', font: { family: 'JetBrains Mono', size: 10 } },\n          grid: { color: 'rgba(23,36,28,0.06)' },\n          border: { color: '#17241c', width: 1.5 },\n        },\n      },\n      plugins: {\n        legend: { display: false },\n        tooltip: {\n          backgroundColor: '#17241c',\n          titleFont: { family: 'JetBrains Mono', size: 11 },\n          bodyFont: { family: 'Space Grotesk', size: 13 },\n          padding: 12,\n          borderColor: '#c8462c',\n          borderWidth: 1,\n          displayColors: true,\n          callbacks: {\n            title: (items) => items.length ? `Matchweek ${items[0].parsed.x}` : '',\n            label: (ctx) => ` ${ctx.dataset.label}: ${ctx.parsed.y} pts`,\n          }\n        }\n      }\n    }\n  });\n}\n\nfunction toggleTitleRaceLine(idx) {\n  if (!titleRaceChartInst) return;\n  const meta = titleRaceChartInst.getDatasetMeta(idx);\n  meta.hidden = meta.hidden === null ? true : !meta.hidden;\n  const chip = document.querySelector(`.title-race-chip[data-idx=\"${idx}\"]`);\n  if (chip) chip.classList.toggle('off', meta.hidden);\n  titleRaceChartInst.update();\n}\n\n// ====================================================================\n// RESULTS / MATCHDAY\n// ====================================================================\nlet liveRefreshTimer = null;\n\nasync function loadResults(round, silent = false) {\n  if (!silent) {\n    document.getElementById('resultsContent').innerHTML = `<div class=\"loading-wrap\"><div class=\"spinner\"></div><p>Loading\u2026</p></div>`;\n  }\n  document.getElementById('rndLabel').textContent = `Loading\u2026`;\n  document.getElementById('rndNumberLabel').textContent = `Matchweek ${round}`;\n  document.getElementById('prevRnd').disabled = round <= 1;\n  document.getElementById('nextRnd').disabled = round >= maxRound + 2;\n\n  try {\n    const [data, espnLive] = await Promise.all([\n      apiFetch(SPORTSDB_ROUND(round)),\n      fetchEspnLiveMap(),\n      tvDataPromise,\n    ]);\n    const events = data.events || [];\n    const today = new Date().toISOString().slice(0, 10);\n    for (const ev of events) {\n      if (ev.dateEvent !== today) continue;\n      const key = normaliseTeamLite(ev.strHomeTeam) + '|' + normaliseTeamLite(ev.strAwayTeam);\n      const live = espnLive[key];\n      if (!live) continue;\n      if (!Number.isNaN(live.home)) ev.intHomeScore = String(live.home);\n      if (!Number.isNaN(live.away)) ev.intAwayScore = String(live.away);\n      if (live.status) ev.strStatus = live.status;\n      if (live.progress) ev.strProgress = live.progress;\n    }\n    roundCache[round] = events;\n\n    if (events.length > 0) {\n      const r = parseInt(events[0].intRound || round);\n      if (r > maxRound) maxRound = r;\n    }\n    renderRound(events, round, silent);\n    scheduleRefreshIfLive(events, round);\n  } catch(e) {\n    if (!silent) document.getElementById('resultsContent').innerHTML = errHtml('Could not load results.');\n    // Reschedule on error so a transient fetch failure doesn't stop live polling.\n    scheduleRefreshIfLive(roundCache[round] || [], round);\n  }\n}\n\n// TV broadcaster data\nconst TV_PROXIES = [\n  'https://api.codetabs.com/v1/proxy/?quest=',\n  'https://api.allorigins.win/raw?url=',\n  'https://thingproxy.freeboard.io/fetch/',\n];\nconst TV_SOURCE = 'https://www.live-footballontv.com/live-english-football-on-tv.html';\nlet tvLookup = {};\nlet tvDataPromise = null;\nlet tvFetchStatus = 'pending';\n\nfunction channelLogo(name) {\n  const lc = name.toLowerCase();\n  const common = 'width=\"26\" height=\"13\" style=\"flex-shrink:0;vertical-align:middle\"';\n  if (lc.includes('sky')) {\n    return `<svg ${common} viewBox=\"0 0 42 18\"><rect width=\"42\" height=\"18\" rx=\"2.5\" fill=\"#e8003d\"/><text x=\"21\" y=\"13.5\" text-anchor=\"middle\" fill=\"#fff\" font-family=\"Arial Black, Arial, sans-serif\" font-weight=\"900\" font-size=\"12\" font-style=\"italic\">sky</text></svg>`;\n  }\n  if (lc.includes('tnt')) {\n    return `<svg ${common} viewBox=\"0 0 42 18\"><rect width=\"42\" height=\"18\" rx=\"2.5\" fill=\"#ff6900\"/><text x=\"21\" y=\"13.5\" text-anchor=\"middle\" fill=\"#fff\" font-family=\"Arial Black, Arial, sans-serif\" font-weight=\"900\" font-size=\"10.5\">TNT</text></svg>`;\n  }\n  if (lc.includes('amazon') || lc.includes('prime')) {\n    return `<svg ${common} viewBox=\"0 0 42 18\"><rect width=\"42\" height=\"18\" rx=\"2.5\" fill=\"#00a8e1\"/><text x=\"21\" y=\"13\" text-anchor=\"middle\" fill=\"#fff\" font-family=\"Arial, sans-serif\" font-weight=\"800\" font-size=\"9\">prime</text></svg>`;\n  }\n  if (lc.includes('bbc')) {\n    return `<svg ${common} viewBox=\"0 0 42 18\"><rect width=\"42\" height=\"18\" rx=\"1\" fill=\"#000\"/><text x=\"21\" y=\"13.5\" text-anchor=\"middle\" fill=\"#fff\" font-family=\"Arial Black, Arial, sans-serif\" font-weight=\"900\" font-size=\"11\">BBC</text></svg>`;\n  }\n  if (lc.includes('itv')) {\n    return `<svg ${common} viewBox=\"0 0 42 18\"><rect width=\"42\" height=\"18\" rx=\"9\" fill=\"#fff\" stroke=\"#17241c\" stroke-width=\"1\"/><text x=\"21\" y=\"13.5\" text-anchor=\"middle\" fill=\"#ea178c\" font-family=\"Arial, sans-serif\" font-weight=\"800\" font-size=\"11\" font-style=\"italic\">itv</text></svg>`;\n  }\n  if (lc.includes('premier league')) {\n    return `<svg ${common} viewBox=\"0 0 42 18\"><rect width=\"42\" height=\"18\" rx=\"2.5\" fill=\"#1d3a2a\"/><text x=\"21\" y=\"13.5\" text-anchor=\"middle\" fill=\"#f1ead8\" font-family=\"Arial Black, Arial, sans-serif\" font-weight=\"900\" font-size=\"11\">PL</text></svg>`;\n  }\n  return '';\n}\n\nfunction normaliseTeam(name) {\n  return name.toLowerCase()\n    .replace(/&amp;/g, '&').replace(/\\s*&\\s*/g, ' and ')\n    .replace(/\\bafc\\b/g, '').replace(/\\bfc\\b/g, '')\n    .replace(/[^a-z0-9 ]/g, ' ').replace(/\\s+/g, ' ').trim();\n}\n\nasync function fetchViaProxies(targetUrl) {\n  let lastErr;\n  for (const proxy of TV_PROXIES) {\n    try {\n      const res = await fetch(proxy + encodeURIComponent(targetUrl));\n      if (!res.ok) { lastErr = `${proxy} -> HTTP ${res.status}`; continue; }\n      const text = await res.text();\n      if (text && text.length > 5000 && text.includes('fixture')) return text;\n      lastErr = `${proxy} -> unexpected body`;\n    } catch(e) { lastErr = `${proxy} -> ${e.message}`; }\n  }\n  throw new Error(`all proxies failed: ${lastErr}`);\n}\n\nasync function fetchTVData() {\n  try {\n    const html = await fetchViaProxies(TV_SOURCE);\n    const doc = new DOMParser().parseFromString(html, 'text/html');\n    const fixtures = doc.querySelectorAll('.fixture');\n    fixtures.forEach(fix => {\n      const comp = fix.querySelector('.fixture__competition')?.textContent?.trim() || '';\n      if (comp !== 'Premier League') return;\n      const teams = fix.querySelector('.fixture__teams')?.textContent?.trim() || '';\n      if (!teams) return;\n      const pills = fix.querySelectorAll('.channel-pill');\n      const channels = [];\n      pills.forEach(p => {\n        const ch = p.textContent.trim();\n        const lc = ch.toLowerCase();\n        if (lc.includes('ultra hdr')) return;\n        if (ch && (lc.includes('sky') || lc.includes('tnt') || lc.includes('amazon') ||\n          lc.includes('bbc') || lc.includes('itv') || lc.includes('premier league'))) channels.push(ch);\n      });\n      if (channels.length) {\n        const parts = teams.split(/\\s+v\\s+/i);\n        if (parts.length === 2) {\n          tvLookup[`${normaliseTeam(parts[0])}|${normaliseTeam(parts[1])}`] = channels;\n        }\n      }\n    });\n    tvFetchStatus = Object.keys(tvLookup).length > 0 ? 'ok' : 'failed';\n  } catch(e) {\n    tvFetchStatus = 'failed';\n    console.warn('[TV] fetch failed:', e);\n  }\n}\n\nfunction findTVChannels(home, away) {\n  const h = normaliseTeam(home), a = normaliseTeam(away);\n  if (tvLookup[`${h}|${a}`]) return tvLookup[`${h}|${a}`];\n  const tokens = s => s.split(' ').filter(t => t.length > 3);\n  const hTok = tokens(h), aTok = tokens(a);\n  for (const key of Object.keys(tvLookup)) {\n    const [kh, ka] = key.split('|');\n    const khTok = tokens(kh), kaTok = tokens(ka);\n    const hMatch = hTok.some(t => khTok.includes(t)) || khTok.some(t => hTok.includes(t));\n    const aMatch = aTok.some(t => kaTok.includes(t)) || kaTok.some(t => aTok.includes(t));\n    if (hMatch && aMatch) return tvLookup[key];\n  }\n  return null;\n}\n\ntvDataPromise = fetchTVData();\n\nfunction isMatchLive(ev) {\n  return ['1H','2H','HT','ET','PEN','LIVE'].includes((ev.strStatus || '').toUpperCase());\n}\nfunction isMatchToday(ev) {\n  if (!ev.dateEvent) return false;\n  return ev.dateEvent === new Date().toISOString().slice(0,10);\n}\nfunction scheduleRefreshIfLive(events, round) {\n  clearTimeout(liveRefreshTimer);\n  const hasLive = events.some(isMatchLive);\n  const hasToday = events.some(isMatchToday);\n  if (hasLive) {\n    liveRefreshTimer = setTimeout(() => {\n      if (activeSection === 'results' && currentRound === round) loadResults(round, true);\n    }, 60000);\n  } else if (hasToday) {\n    liveRefreshTimer = setTimeout(() => {\n      if (activeSection === 'results' && currentRound === round) loadResults(round, true);\n    }, 90000);\n  }\n}\n\nfunction renderRound(events, round, silent = false) {\n  if (!events || events.length === 0) {\n    document.getElementById('resultsContent').innerHTML = `<div class=\"error-wrap\"><div class=\"icon\">\u23af</div><p>No matches found for Matchweek ${round}.</p></div>`;\n    return;\n  }\n\n  const hasLive = events.some(isMatchLive);\n\n  // Build week label\n  const dates = events.filter(ev => ev.dateEvent).map(ev => new Date(ev.dateEvent + 'T12:00:00'));\n  if (dates.length) {\n    const minD = new Date(Math.min(...dates)), maxD = new Date(Math.max(...dates));\n    const fmt = d => d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });\n    document.getElementById('rndLabel').textContent =\n      minD.toDateString() === maxD.toDateString() ? fmt(minD) : `${fmt(minD)} \u2013 ${fmt(maxD)}`;\n    document.getElementById('rndNumberLabel').textContent = `Matchweek ${round}`;\n  }\n\n  const cards = events.map((ev, idx) => {\n    const hScore = ev.intHomeScore, aScore = ev.intAwayScore;\n    const hasScore = hScore !== null && hScore !== '' && hScore !== 'null';\n    const hLogo = ev.strHomeTeamBadge || '';\n    const aLogo = ev.strAwayTeamBadge || '';\n    const live = isMatchLive(ev);\n    const today = isMatchToday(ev);\n    const evId = ev.idEvent || `${ev.strHomeTeam}-${ev.strAwayTeam}`;\n    const date = ev.dateEvent\n      ? new Date(ev.dateEvent + 'T12:00:00').toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' })\n      : '';\n\n    let scoreHtml, winCls = '';\n    if (hasScore) {\n      const h = parseInt(hScore), a = parseInt(aScore);\n      winCls = h > a ? 'win-home' : a > h ? 'win-away' : 'draw';\n\n      // Check if score changed since last render\n      const prev = prevScoreMap[evId];\n      const changed = prev && (prev.h !== h || prev.a !== a);\n      prevScoreMap[evId] = { h, a };\n\n      const hSpan = `<span class=\"score-digit${changed && prev.h !== h ? ' roll' : ''}\">${h}</span>`;\n      const aSpan = `<span class=\"score-digit${changed && prev.a !== a ? ' roll' : ''}\">${a}</span>`;\n      scoreHtml = `<div class=\"fixture-score\">${hSpan} \u2013 ${aSpan}</div>`;\n    } else {\n      scoreHtml = `<div class=\"fixture-score vs\">vs</div>`;\n    }\n\n    const homeLogo = hLogo ? `<img class=\"fixture-team-logo\" src=\"${hLogo}\" alt=\"\" loading=\"lazy\" onerror=\"this.style.display='none'\">` : '';\n    const awayLogo = aLogo ? `<img class=\"fixture-team-logo\" src=\"${aLogo}\" alt=\"\" loading=\"lazy\" onerror=\"this.style.display='none'\">` : '';\n\n    let statusLbl;\n    if (live) {\n      const raw = (ev.strStatus || '').toUpperCase();\n      // Prefer the minute elapsed (e.g. \"67'\") when available\n      let display;\n      if (ev.strProgress && /\\d/.test(ev.strProgress)) {\n        display = ev.strProgress.includes(\"'\") ? ev.strProgress : `${ev.strProgress}'`;\n      } else if (raw === 'HT') display = 'Half Time';\n      else if (raw === 'PEN') display = 'Penalties';\n      else if (raw === 'ET') display = 'Extra Time';\n      else display = 'Live';\n      statusLbl = `<div class=\"fixture-status live\">\n        <span style=\"width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;animation:pulse 1.5s infinite\"></span>\n        ${display}\n      </div>`;\n    } else if (hasScore) {\n      statusLbl = `<div class=\"fixture-status\">Full Time</div>`;\n    } else {\n      const time = ev.strTime ? ev.strTime.slice(0,5) : 'TBC';\n      statusLbl = `<div class=\"fixture-status${today ? ' today' : ''}\">${time}</div>`;\n    }\n\n    const channels = findTVChannels(ev.strHomeTeam || '', ev.strAwayTeam || '');\n    const tvBadge = channels\n      ? `<div class=\"tv-row\">\n          <span class=\"tv-row-label\">On</span>\n          ${channels.map(ch => `<span class=\"tv-chip\">${channelLogo(ch)}${ch}</span>`).join('')}\n         </div>`\n      : '';\n\n    return `<div class=\"fixture-card ${winCls}${live ? ' live' : ''}\">\n      <div class=\"fixture-meta\">\n        <span>${date}</span>\n        ${ev.strVenue ? `<span class=\"venue\">${ev.strVenue}</span>` : ''}\n      </div>\n      <div class=\"fixture-teams\">\n        <div class=\"fixture-team\">${homeLogo}<div class=\"fixture-team-name\">${ev.strHomeTeam}</div></div>\n        <div class=\"fixture-score-box\">${scoreHtml}${statusLbl}</div>\n        <div class=\"fixture-team\">${awayLogo}<div class=\"fixture-team-name\">${ev.strAwayTeam}</div></div>\n      </div>\n      ${tvBadge}\n    </div>`;\n  }).join('');\n\n  const statusBits = [];\n  if (hasLive) statusBits.push(`<span class=\"dot\" style=\"color:var(--accent)\">\u25cf</span> Auto-refreshing while live`);\n  if (tvFetchStatus === 'failed') statusBits.push(`<span style=\"color:var(--accent-2)\">\u26a0</span> TV channel data unavailable`);\n\n  document.getElementById('resultsUpdated').innerHTML = statusBits.join(' \u00b7 ');\n  document.getElementById('resultsContent').innerHTML = `<div class=\"fixtures-grid\">${cards}</div>`;\n}\n\nfunction changeRound(delta) {\n  clearTimeout(liveRefreshTimer);\n  currentRound = Math.max(1, Math.min(maxRound + 5, currentRound + delta));\n  loadResults(currentRound);\n}\n\n// ====================================================================\n// DOSSIER (stats)\n// ====================================================================\nfunction loadStats() {\n  if (!standingsData) {\n    document.getElementById('statsContent').innerHTML = errHtml('Standings data not loaded yet.');\n    return;\n  }\n  renderStats();\n}\n\nfunction renderStats() {\n  const entries = standingsData?.children?.[0]?.standings?.entries || [];\n  if (!entries.length) {\n    document.getElementById('statsContent').innerHTML = errHtml('No data.');\n    return;\n  }\n\n  const byGF  = [...entries].sort((a,b) => getStat(b,'pointsFor')       - getStat(a,'pointsFor'));\n  const byGA  = [...entries].sort((a,b) => getStat(a,'pointsAgainst')   - getStat(b,'pointsAgainst'));\n  const byGD  = [...entries].sort((a,b) => getStat(b,'pointDifferential') - getStat(a,'pointDifferential'));\n  const byW   = [...entries].sort((a,b) => getStat(b,'wins')             - getStat(a,'wins'));\n\n  const teamRow = (entry, value, maxVal, rank) => {\n    const team = entry.team;\n    const logo = team?.logos?.[0]?.href || '';\n    const pct = maxVal > 0 ? (value / maxVal) * 100 : 0;\n    const logoEl = logo\n      ? `<img src=\"${logo}\" style=\"width:22px;height:22px;object-fit:contain;flex-shrink:0\" loading=\"lazy\" onerror=\"this.style.display='none'\">`\n      : '';\n    return `<div class=\"stat-row\">\n      <div class=\"stat-rank\">${String(rank).padStart(2,'0')}</div>\n      <div class=\"stat-player\">\n        ${logoEl}\n        <div class=\"stat-player-name\">${team?.displayName || '?'}</div>\n      </div>\n      <div class=\"stat-bar-wrap\"><div class=\"stat-bar\"><div class=\"stat-bar-fill\" style=\"width:0%\" data-pct=\"${pct}\"></div></div></div>\n      <div class=\"stat-val\">${Math.round(value)}</div>\n    </div>`;\n  };\n\n  const buildList = (sorted, statName) => {\n    const maxVal = getStat(sorted[0], statName);\n    return sorted.slice(0,10).map((e, i) => teamRow(e, getStat(e, statName), maxVal, i + 1)).join('');\n  };\n\n  document.getElementById('statsContent').innerHTML = `\n    <div class=\"stats-grid\">\n      <div class=\"stats-card\" data-num=\"GF\">\n        <h3>Goals Scored</h3>\n        <div class=\"stats-card-sub\">Most prolific attacks</div>\n        ${buildList(byGF, 'pointsFor')}\n      </div>\n      <div class=\"stats-card\" data-num=\"GA\">\n        <h3>Fewest Conceded</h3>\n        <div class=\"stats-card-sub\">Stingiest defences</div>\n        ${buildList(byGA, 'pointsAgainst')}\n      </div>\n      <div class=\"stats-card\" data-num=\"GD\">\n        <h3>Goal Difference</h3>\n        <div class=\"stats-card-sub\">Balance of the ledger</div>\n        ${buildList(byGD, 'pointDifferential')}\n      </div>\n      <div class=\"stats-card\" data-num=\"W\">\n        <h3>Most Wins</h3>\n        <div class=\"stats-card-sub\">Three-point specialists</div>\n        ${buildList(byW, 'wins')}\n      </div>\n      <div class=\"stats-card\" data-num=\"GF/GA\" style=\"grid-column:1/-1\">\n        <h3>Attack vs Defence</h3>\n        <div class=\"stats-card-sub\">Goals scored and conceded, ranked by attacking output</div>\n        <div class=\"chart-wrap\"><canvas id=\"teamGoalsChart\"></canvas></div>\n      </div>\n    </div>`;\n\n  // Animate bars in\n  setTimeout(() => {\n    document.querySelectorAll('.stat-bar-fill').forEach(el => {\n      el.style.width = el.dataset.pct + '%';\n    });\n  }, 50);\n\n  setTimeout(() => renderTeamGoalsChart(entries), 100);\n}\n\nfunction renderTeamGoalsChart(entries) {\n  try {\n    const sorted = [...entries].sort((a,b) => getStat(b,'pointsFor') - getStat(a,'pointsFor'));\n    const labels = sorted.map(e => e.team?.abbreviation || '?');\n    const gf = sorted.map(e => getStat(e,'pointsFor'));\n    const ga = sorted.map(e => getStat(e,'pointsAgainst'));\n\n    if (teamGoalsChartInst) teamGoalsChartInst.destroy();\n    const ctx = document.getElementById('teamGoalsChart');\n    if (!ctx) return;\n    teamGoalsChartInst = new Chart(ctx, {\n      type: 'bar',\n      data: {\n        labels,\n        datasets: [\n          { label: 'Goals For', data: gf, backgroundColor: '#1d3a2a', borderColor: '#17241c', borderWidth: 1 },\n          { label: 'Goals Against', data: ga, backgroundColor: '#c8462c', borderColor: '#17241c', borderWidth: 1 },\n        ]\n      },\n      options: {\n        responsive: true, maintainAspectRatio: false,\n        animation: { duration: 1100, easing: 'easeOutCubic' },\n        scales: {\n          y: {\n            ticks: { color: '#7a7560', font: { family: 'JetBrains Mono', size: 10 } },\n            grid: { color: 'rgba(23,36,28,0.06)' },\n            border: { color: '#17241c', width: 1.5 },\n          },\n          x: {\n            ticks: { color: '#7a7560', font: { family: 'JetBrains Mono', size: 10 } },\n            grid: { display: false },\n            border: { color: '#17241c', width: 1.5 },\n          }\n        },\n        plugins: {\n          legend: {\n            labels: { color: '#17241c', font: { family: 'JetBrains Mono', size: 11 }, boxWidth: 14, boxHeight: 14 }\n          }\n        }\n      }\n    });\n  } catch(e) { console.warn('Chart error', e); }\n}\n\n// ====================================================================\n// WIRE (news)\n// ====================================================================\nasync function fetchESPNArticles() {\n  const data = await apiFetch(ESPN_NEWS);\n  const articles = data.articles || [];\n  return articles.map(a => {\n    const thumbImg = a.images?.[0]?.url || '';\n    const fullImg  = a.images?.find(im => (im.width||0) >= 800)?.url || thumbImg;\n    const teams = (a.categories || []).filter(c => c.type === 'team').map(c => c.description);\n    return {\n      source: 'ESPN',\n      headline: a.headline || a.title || 'Untitled',\n      description: a.description || '',\n      date: a.published ? new Date(a.published) : new Date(0),\n      thumbImg, fullImg,\n      link: a.links?.web?.href || a.links?.api?.news?.href || '',\n      tag: a.categories?.find(c => c.type === 'team')?.description || a.type || 'Football',\n      teams,\n    };\n  });\n}\n\nfunction stripHtml(s) {\n  const tmp = document.createElement('div');\n  tmp.innerHTML = s || '';\n  return (tmp.textContent || '').trim();\n}\n\nasync function fetchSkyArticles() {\n  const data = await apiFetch(SKY_RSS2JSON);\n  if (data.status !== 'ok') throw new Error(`rss2json status=${data.status}`);\n  const items = (data.items || []).filter(it => !SKY_NON_FOOTBALL.test(it.link || ''));\n  return items.map(it => {\n    const img = it.thumbnail || it.enclosure?.link || '';\n    return {\n      source: 'Sky Sports',\n      headline: stripHtml(it.title) || 'Untitled',\n      description: stripHtml(it.description),\n      date: it.pubDate ? new Date(it.pubDate.replace(' ', 'T') + 'Z') : new Date(0),\n      thumbImg: img, fullImg: img,\n      link: it.link || '',\n      tag: (it.categories && it.categories[0]) || 'Football',\n      teams: [],\n    };\n  });\n}\n\nasync function loadNews() {\n  const results = await Promise.allSettled([fetchESPNArticles(), fetchSkyArticles()]);\n  const items = [];\n  if (results[0].status === 'fulfilled') items.push(...results[0].value);\n  if (results[1].status === 'fulfilled') items.push(...results[1].value);\n  if (!items.length) {\n    document.getElementById('newsContent').innerHTML = errHtml('Could not load news.');\n    return;\n  }\n  items.sort((a, b) => b.date - a.date);\n  renderNews(items);\n}\n\nfunction renderNews(items) {\n  const sourceChip = (src) => {\n    const cls = src === 'Sky Sports' ? 'news-source-sky' : 'news-source-espn';\n    return `<span class=\"news-source-chip ${cls}\">${src}</span>`;\n  };\n\n  const cards = items.map((a, i) => {\n    const dateStr = a.date && !isNaN(a.date)\n      ? a.date.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'long' })\n      : '';\n    const teamChips = a.teams.map(t => `<div class=\"news-team-chip\">${t}</div>`).join('');\n    const readLabel = a.source === 'Sky Sports' ? 'Sky Sports \u2197' : 'ESPN \u2197';\n\n    return `<div class=\"news-card\" id=\"news-${i}\" onclick=\"toggleNews(${i})\">\n      <div class=\"news-card-collapsed\">\n        ${a.thumbImg ? `<img class=\"news-img\" src=\"${a.thumbImg}\" alt=\"\" loading=\"lazy\" onerror=\"this.style.display='none'\">` : ''}\n        <div class=\"news-body-wrap\">\n          <div class=\"news-date\">${sourceChip(a.source)}<span>${dateStr}</span></div>\n          <div class=\"news-headline\">${a.headline}</div>\n          ${a.description ? `<div class=\"news-desc\" style=\"display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden\">${a.description}</div>` : ''}\n          <div class=\"news-tag\">${a.tag}</div>\n        </div>\n        <div class=\"news-chevron\">\u25be</div>\n      </div>\n      <div class=\"news-expanded-panel\">\n        ${a.fullImg ? `<img class=\"news-expanded-img\" src=\"${a.fullImg}\" alt=\"\" loading=\"lazy\" onerror=\"this.style.display='none'\">` : ''}\n        <div class=\"news-expanded-body\">\n          <div class=\"news-expanded-headline\">${a.headline}</div>\n          <div class=\"news-expanded-meta\">\n            ${sourceChip(a.source)}\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.08em\">${dateStr}</span>\n            ${teamChips}\n          </div>\n          ${a.description ? `<div class=\"news-expanded-desc\">${a.description}</div>` : ''}\n          ${a.link ? `<a class=\"news-read-btn\" href=\"${a.link}\" target=\"_blank\" rel=\"noopener\" onclick=\"event.stopPropagation()\">Read at ${readLabel}</a>` : ''}\n        </div>\n      </div>\n    </div>`;\n  }).join('');\n\n  document.getElementById('newsContent').innerHTML = `<div class=\"news-list\">${cards}</div>`;\n}\n\nfunction toggleNews(i) {\n  document.getElementById(`news-${i}`).classList.toggle('expanded');\n}\n\n// ====================================================================\n// TEAM MODAL\n// ====================================================================\nasync function openTeamModal(espnTeamId, encodedName, encodedLogo) {\n  const teamName = decodeURIComponent(encodedName);\n  const logo = decodeURIComponent(encodedLogo);\n  document.getElementById('overlay').classList.add('open');\n  document.getElementById('modalBody').innerHTML = `<div class=\"loading-wrap\"><div class=\"spinner\"></div><p>Loading ${teamName}\u2026</p></div>`;\n\n  try {\n    const allEntries = standingsData?.children?.[0]?.standings?.entries || [];\n    const entry = allEntries.find(e => e.team?.id === espnTeamId) || null;\n    const getStatM = (name) => entry ? Math.round(parseFloat(entry.stats?.find(s => s.name === name)?.value || 0)) : 0;\n\n    const pos = getStatM('rank') || '\u2014';\n    const pts = getStatM('points');\n    const W = getStatM('wins'), D = getStatM('ties'), L = getStatM('losses');\n    const gf = getStatM('pointsFor'), ga = getStatM('pointsAgainst');\n    const gd = gf - ga;\n\n    let seasonResults = [];\n    try {\n      if (!allSeasonEvents) {\n        const sd = await apiFetch(SPORTSDB_SEASON);\n        allSeasonEvents = sd.events || [];\n      }\n      seasonResults = (allSeasonEvents || []).filter(e => e.strHomeTeam === teamName || e.strAwayTeam === teamName);\n    } catch(e) {}\n\n    let progressionHtml = '';\n    if (seasonResults.length > 0) {\n      const played = seasonResults.filter(e => e.intHomeScore !== null && e.intHomeScore !== 'null' && e.intHomeScore !== '');\n      progressionHtml = buildProgressionChartData(played, teamName);\n    }\n\n    const logoEl = logo\n      ? `<img class=\"modal-logo\" src=\"${logo}\" alt=\"${teamName}\" onerror=\"this.style.display='none'\">`\n      : `<div style=\"width:72px;height:72px;background:var(--paper-2);border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-family:monospace;font-weight:700;color:var(--ink)\">${teamName.slice(0,3)}</div>`;\n\n    const gdStr = gd >= 0 ? `+${gd}` : `${gd}`;\n    const gdColor = gd >= 0 ? 'var(--win)' : 'var(--loss)';\n\n    const resultRows = seasonResults.slice().reverse().map(ev => {\n      const isHome = ev.strHomeTeam === teamName;\n      const opp = isHome ? ev.strAwayTeam : ev.strHomeTeam;\n      const hs = ev.intHomeScore, as_ = ev.intAwayScore;\n      const played = hs !== null && hs !== 'null' && hs !== '';\n      let outcome = 'U', badge = 'rbadge-u', scoreStr = 'vs';\n      if (played) {\n        const h = parseInt(hs), a = parseInt(as_);\n        scoreStr = isHome ? `${h} \u2013 ${a}` : `${a} \u2013 ${h}`;\n        const myG = isHome ? h : a, thG = isHome ? a : h;\n        outcome = myG > thG ? 'W' : myG < thG ? 'L' : 'D';\n        badge = outcome === 'W' ? 'rbadge-w' : outcome === 'D' ? 'rbadge-d' : 'rbadge-l';\n      }\n      return `<div class=\"result-item\">\n        <div class=\"result-round\">MW${String(ev.intRound||'?').padStart(2,'0')}</div>\n        <div class=\"result-teams\">${isHome ? 'vs' : '@'} ${opp}</div>\n        <div class=\"result-score\">${scoreStr}</div>\n        <div class=\"result-badge ${badge}\">${outcome}</div>\n      </div>`;\n    }).join('');\n\n    document.getElementById('modalBody').innerHTML = `\n      <div class=\"modal-head\">\n        ${logoEl}\n        <div>\n          <div class=\"modal-team-name\">${teamName}</div>\n          <div class=\"modal-team-sub\">2025 / 26 Season \u00b7 Club File</div>\n        </div>\n      </div>\n      <div class=\"kpi-row\">\n        <div class=\"kpi\"><div class=\"val\" data-count=\"${pos === '\u2014' ? 0 : pos}\">${pos === '\u2014' ? '\u2014' : '0'}</div><div class=\"lbl\">Position</div></div>\n        <div class=\"kpi\"><div class=\"val\" data-count=\"${pts}\">0</div><div class=\"lbl\">Points</div></div>\n        <div class=\"kpi\"><div class=\"val\" data-count=\"${W}\">0</div><div class=\"lbl\">Wins</div></div>\n        <div class=\"kpi\"><div class=\"val\" data-count=\"${gf}\">0</div><div class=\"lbl\">Goals For</div></div>\n        <div class=\"kpi\"><div class=\"val\" style=\"color:${gdColor}\" data-count=\"${gd}\" data-prefix=\"${gd >= 0 ? '+' : ''}\">0</div><div class=\"lbl\">Goal Diff</div></div>\n      </div>\n      ${progressionHtml ? `\n        <div class=\"modal-section-title\">Points Progression</div>\n        <div class=\"chart-box\"><canvas id=\"progressionChart\"></canvas></div>\n      ` : ''}\n      ${resultRows ? `\n        <div class=\"modal-section-title\">Season Results</div>\n        <div class=\"results-scroll\">${resultRows}</div>\n      ` : ''}`;\n\n    // Animate KPI counts\n    document.querySelectorAll('.kpi .val[data-count]').forEach(el => {\n      const to = parseInt(el.dataset.count);\n      if (isNaN(to)) return;\n      const prefix = el.dataset.prefix || '';\n      const start = performance.now();\n      const dur = 900;\n      function f(now) {\n        const t = Math.min(1, (now - start) / dur);\n        const eased = 1 - Math.pow(1 - t, 3);\n        const v = Math.round(to * eased);\n        el.textContent = prefix + v;\n        if (t < 1) requestAnimationFrame(f);\n      }\n      requestAnimationFrame(f);\n    });\n\n    if (progressionHtml) renderProgressionChart(progressionHtml);\n  } catch(e) {\n    console.error(e);\n    document.getElementById('modalBody').innerHTML = errHtml('Could not load team data.');\n  }\n}\n\nfunction buildProgressionChartData(playedEvents, teamName) {\n  const sorted = [...playedEvents].sort((a,b) => parseInt(a.intRound||0) - parseInt(b.intRound||0));\n  if (!sorted.length) return '';\n  const rounds = [], cumPts = [];\n  let pts = 0;\n  sorted.forEach(ev => {\n    const isHome = ev.strHomeTeam === teamName;\n    const h = parseInt(ev.intHomeScore), a = parseInt(ev.intAwayScore);\n    const mine = isHome ? h : a, theirs = isHome ? a : h;\n    if (mine > theirs) pts += 3; else if (mine === theirs) pts += 1;\n    rounds.push(`MW${ev.intRound}`);\n    cumPts.push(pts);\n  });\n  return JSON.stringify({ rounds, cumPts });\n}\n\nfunction renderProgressionChart(dataStr) {\n  try {\n    const { rounds, cumPts } = JSON.parse(dataStr);\n    if (progressionChartInst) progressionChartInst.destroy();\n    const ctx = document.getElementById('progressionChart');\n    if (!ctx) return;\n    progressionChartInst = new Chart(ctx, {\n      type: 'line',\n      data: {\n        labels: rounds,\n        datasets: [{\n          data: cumPts,\n          borderColor: '#1d3a2a',\n          backgroundColor: 'rgba(29,58,42,0.12)',\n          fill: true, tension: 0.35,\n          pointRadius: 3, pointHoverRadius: 6, borderWidth: 2.5,\n          pointBackgroundColor: '#c8462c', pointBorderColor: '#17241c',\n        }]\n      },\n      options: {\n        responsive: true, maintainAspectRatio: false,\n        animation: { duration: 1100, easing: 'easeOutCubic' },\n        scales: {\n          y: { ticks: { color: '#7a7560', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: 'rgba(23,36,28,0.06)' }, border: { color: '#17241c', width: 1.5 }, min: 0 },\n          x: { ticks: { color: '#7a7560', maxTicksLimit: 12, font: { family: 'JetBrains Mono', size: 10 } }, grid: { display: false }, border: { color: '#17241c', width: 1.5 } }\n        },\n        plugins: { legend: { display: false } }\n      }\n    });\n  } catch(e) {}\n}\n\nfunction overlayClick(e) {\n  if (e.target === document.getElementById('overlay')) closeModal();\n}\nfunction closeModal() {\n  document.getElementById('overlay').classList.remove('open');\n  if (progressionChartInst) { progressionChartInst.destroy(); progressionChartInst = null; }\n}\n\n// ====================================================================\n// NAV\n// ====================================================================\nfunction switchTab(tab, btn) {\n  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));\n  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));\n  document.getElementById(`section-${tab}`).classList.add('active');\n  btn.classList.add('active');\n  activeSection = tab;\n\n  if (tab !== 'results') clearTimeout(liveRefreshTimer);\n  if (tab === 'results' && currentRound === 1) {\n    detectCurrentRound().then(r => { currentRound = r; loadResults(r); });\n  }\n  if (tab === 'stats' && !document.querySelector('#statsContent .stats-grid')) loadStats();\n  if (tab === 'news' && !document.querySelector('#newsContent .news-list')) loadNews();\n}\n\nasync function detectCurrentRound() {\n  // Find the most recent round where the MAJORITY of matches are played OR live.\n  // This avoids landing on an upcoming round (all \"vs\") when the user expects to see scores.\n  let lastRoundWithAnyPlayed = null;\n  for (let r = 38; r >= 1; r--) {\n    try {\n      const data = await apiFetch(SPORTSDB_ROUND(r));\n      const evs = data.events || [];\n      if (!evs.length) continue;\n      const played = evs.filter(e => e.intHomeScore !== null && e.intHomeScore !== 'null' && e.intHomeScore !== '');\n      const live = evs.filter(isMatchLive);\n      roundCache[r] = evs;\n\n      if (live.length > 0) {\n        // There's live action \u2014 always land here\n        maxRound = Math.max(r + 2, 38);\n        return r;\n      }\n      // Remember the first round we see with any played match, as fallback\n      if (played.length > 0 && lastRoundWithAnyPlayed === null) lastRoundWithAnyPlayed = r;\n      // If the round is majority-played, land here\n      if (played.length >= Math.ceil(evs.length / 2)) {\n        maxRound = Math.max(r + 2, 38);\n        return r;\n      }\n    } catch(e) {}\n  }\n  if (lastRoundWithAnyPlayed !== null) {\n    maxRound = Math.max(lastRoundWithAnyPlayed + 2, 38);\n    return lastRoundWithAnyPlayed;\n  }\n  return 33;\n}\n\n// Keyboard shortcuts\ndocument.addEventListener('keydown', (e) => {\n  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n  if (activeSection === 'results') {\n    if (e.key === 'ArrowLeft') changeRound(-1);\n    if (e.key === 'ArrowRight') changeRound(1);\n  }\n  if (e.key === 'Escape' && document.getElementById('overlay').classList.contains('open')) closeModal();\n});\n\n// ====================================================================\n// INIT\n// ====================================================================\nloadTable();\n<\/script>\n\n\n</body></html>"</script>
