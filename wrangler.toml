name = "matchday-ledger-api"
main = "worker/index.js"
compatibility_date = "2025-04-01"
workers_dev = true

[vars]
API_VERSION = "v1"

[triggers]
crons = ["*/10 * * * *"]

# Production cache setup:
# 1. Run `npm run worker:kv:create`
# 2. Copy the returned namespace id below.
# 3. Uncomment this block before deploying the public API.
#
# [[kv_namespaces]]
# binding = "FOOTBALL_CACHE"
# id = "replace_with_cloudflare_kv_namespace_id"
